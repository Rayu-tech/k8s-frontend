name: Build and Push Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: set_tag
        run: |
          TAG=${GITHUB_SHA::7}
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/k8s-frontend:${IMAGE_TAG} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/k8s-frontend:${IMAGE_TAG} ${{ secrets.DOCKERHUB_USERNAME }}/k8s-frontend:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/k8s-frontend:${IMAGE_TAG}

  cd:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: Rayu-tech/aws-eks-3tier-k8s-stack
          token: ${{ secrets.GH_PAT }}
          path: manifests

      - name: Set Image Tag from Build
        run: echo "IMAGE_TAG=${{ needs.build.outputs.image_tag }}" >> $GITHUB_ENV

      - name: Update Image Tag in YAML
        run: |
          sed -i "s|image: .*k8s-frontend:.*|image: rayusingh/k8s-frontend:${IMAGE_TAG}|g" k8s/frontend.yaml

      - name: Commit and Push Changes
        run: |
          cd manifests
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/frontend.yaml

          # Avoid empty commit failure
          git diff --cached --quiet || git commit -m "Update frontend image to ${IMAGE_TAG}"

          git push
